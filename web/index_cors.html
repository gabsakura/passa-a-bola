<!DOCTYPE html>
<html>

<head>
    <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
    <base href="$FLUTTER_BASE_HREF">

    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="Passa a Bola - Sistema de Campeonatos de Futebol">

    <!-- iOS meta tags & icons -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="passabola">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <title>Passa a Bola</title>
    <link rel="manifest" href="manifest.json">

    <script>
        // The value below is injected by flutter build, do not touch.
        var serviceWorkerVersion = null;
    </script>
    <!-- This script adds the flutter initialization JS code -->
    <script src="flutter.js" defer></script>

    <!-- Google Maps API com configurações CORS -->
    <script>
        // Configuração para resolver problemas de CORS
        window.addEventListener('load', function () {
            // Configurar headers CORS para requisições
            if (window.fetch) {
                const originalFetch = window.fetch;
                window.fetch = function (url, options = {}) {
                    // Adicionar headers CORS para APIs do Google
                    if (url.includes('googleapis.com') || url.includes('maps.googleapis.com')) {
                        options.headers = {
                            ...options.headers,
                            'Access-Control-Allow-Origin': '*',
                            'Access-Control-Allow-Methods': 'GET, POST, PUT, DELETE, OPTIONS',
                            'Access-Control-Allow-Headers': 'Content-Type, Authorization',
                        };
                    }
                    return originalFetch(url, options);
                };
            }
        });
    </script>

    <!-- Google Maps API -->
    <script
        src="https://maps.googleapis.com/maps/api/js?key=__GOOGLE_MAPS_API_KEY__&libraries=places&callback=initMap"
        async defer></script>

    <script>
        // Callback para inicializar o mapa
        function initMap() {
            console.log('Google Maps API carregada com sucesso');
            // Notificar o Flutter que a API está pronta
            if (window.flutter_inappwebview) {
                window.flutter_inappwebview.callHandler('onMapsReady');
            }
        }
    </script>
</head>

<body>
    <script>
        window.addEventListener('load', function (ev) {
            // Download main.dart.js
            _flutter.loader.loadEntrypoint({
                serviceWorker: {
                    serviceWorkerVersion: serviceWorkerVersion,
                },
                onEntrypointLoaded: function (engineInitializer) {
                    engineInitializer.initializeEngine().then(function (appRunner) {
                        appRunner.runApp();
                    });
                }
            });
        });
    </script>

    <!-- Configuração adicional para CORS -->
    <script>
        // Interceptar requisições para resolver CORS
        (function () {
            const originalXHR = window.XMLHttpRequest;
            window.XMLHttpRequest = function () {
                const xhr = new originalXHR();
                const originalOpen = xhr.open;

                xhr.open = function (method, url, async, user, password) {
                    // Adicionar headers CORS para APIs do Google
                    if (url.includes('googleapis.com') || url.includes('maps.googleapis.com')) {
                        this.setRequestHeader('Access-Control-Allow-Origin', '*');
                        this.setRequestHeader('Access-Control-Allow-Methods', 'GET, POST, PUT, DELETE, OPTIONS');
                        this.setRequestHeader('Access-Control-Allow-Headers', 'Content-Type, Authorization');
                    }
                    return originalOpen.apply(this, arguments);
                };

                return xhr;
            };
        })();
    </script>
</body>

</html>
